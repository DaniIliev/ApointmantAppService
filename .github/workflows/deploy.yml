name: Deploy Backend

on:
  push:
    branches: [main, develop]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm i -g @railway/cli

      - name: Deploy to Staging
        if: github.ref == 'refs/heads/develop'
        run: railway up --service ApointmantAppService --environment staging -d
        env:
          RAILWAY_TOKEN: ${{ secrets.STAGING_TOKEN }}

      - name: Deploy to Production
        if: github. ref == 'refs/heads/main'
        run: railway up --service ApointmantAppService --environment production -d
        env:
          RAILWAY_TOKEN: ${{ secrets.PRODUCTION_TOKEN }}
