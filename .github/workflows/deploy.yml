name: Deploy Backend to Railway

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy to Production
        # run: railway up --service AppointDIService --environment production
        run: railway up --service ApointmantAppService --project 0bc95df5-dbd3-4b9a-bbe9-9a16889defb2 -d
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
